spring:
  application:
    name: smart-portfolio-backend

  datasource:
    url: ${NEON_DB_URL}
    username: ${NEON_DB_USERNAME}
    password: ${NEON_DB_PASSWORD}

    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10


  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      show-sql: false

